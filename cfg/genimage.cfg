image boot.vfat {
    vfat {                                                
        files = {                                           
            "BOOT.BIN",                                     
            "zImage",                                       
            "system.dtb",
	    "extlinux/extlinux.conf",
        }
    }
    size = 64M
}

image rootfs.ext4 {                                         
    ext4 { }           
    size = 4096M
}

image boot.img {
    hdimage {
        partition-table-type = "mbr"
    }                                                       
    partition boot {
        partition-type = 0x0b                               
        bootable = true
        image = "boot.vfat"
    }
    partition rootfs {
        partition-type = 0x83
        image = "rootfs.ext4"
    }                                                       
}
